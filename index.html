    .dropdown {

      display: inline-block;
    }

    .dropdown-button {
      padding: 12px 20px;
      background-color: #1565c0;
      color: white;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .dropdown-button:hover {
      background-color: #0d47a1;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      min-width: 220px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      overflow: hidden;
      z-index: 1000;
    }

    .dropdown-content a {
      display: block;
      padding: 12px 16px;
      font-size: 0.95em;
      color: #333;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    #clock {
      margin-left: auto;
      font-size: 1em;
      color: #fff;
      background: rgba(0, 0, 0, 0.15);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      z-index: 2;
    }

    #clock span {
      display: block;
      font-size: 0.85em;
      color: #ddd;
    }

    main {
      text-align: center;

    main p {

    }

    .icon-grid {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      flex-wrap: wrap;
    }

    .icon {
      width: 100px;
      height: 100px;
      background-color: #ffffff;
      border: 2px dashed #bbb;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 1.5em;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.3s;
    }

    .icon:hover {
      transform: scale(1.05);
      background-color: #e3f2fd;
    }

  <script>
    // --- CLOCK LOGIC ---
    let is24Hour = true;

    function updateClock() {
      const now = new Date();
      const clock = document.getElementById('clock');

      let hours = now.getHours();
      let suffix = '';
      if (!is24Hour) {
        suffix = hours >= 12 ? ' PM' : ' AM';
        hours = hours % 12 || 12;
      }

      const h = String(hours).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');

      const dateStr = now.toLocaleDateString(undefined, {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });

      clock.innerHTML = `${h}:${m}:${s}${suffix}<span>${dateStr}</span>`;
    }

    document.getElementById('clock').addEventListener('click', () => {
      is24Hour = !is24Hour;
      updateClock();
    });

    setInterval(updateClock, 1000);
    updateClock();


    // --- PARTICLE ANIMATION LOGIC ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particlesArray = [];

    // Set canvas dimensions
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Track mouse position
    let mouse = {
      x: null,
      y: null,
      radius: 120 // How far the repulsion reaches
    };

    window.addEventListener('mousemove', function(event) {
      mouse.x = event.x;
      mouse.y = event.y;
    });

    window.addEventListener('resize', function() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles(); 
    });

    // 1. Load the Favicon Image dynamically
    const particleImage = new Image();
    // This finds your <link rel="icon"> at the top of the file and uses its href
    const faviconLink = document.querySelector('link[rel="icon"]');
    particleImage.src = faviconLink ? faviconLink.href : 'favicon.svg'; 

    // Particle Object
    class Particle {
      constructor(x, y, size, weight) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.weight = weight; // Speed of falling
      }

      // Draw particle on canvas using the image
      draw() {
        // We draw the image centered on the particle's X/Y coordinates
        ctx.drawImage(particleImage, this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
      }

      // Update particle position & handle repulsion
      update() {
        this.y += this.weight;
        
        // Slightly sway left/right as they fall
        this.x += (Math.random() - 0.5) * 1; 

        // Reset to top if they fall off the bottom
        if (this.y > canvas.height) {
          this.y = 0 - this.size;
          this.x = Math.random() * canvas.width;
          this.weight = (Math.random() * 2) + 0.5; // Reset speed
        }

        // --- MOUSE REPULSION LOGIC ---
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < mouse.radius) {
          // Calculate force pushing particle away
          const forceDirectionX = dx / distance;
          const forceDirectionY = dy / distance;
          const force = (mouse.radius - distance) / mouse.radius;
          
          const directionX = forceDirectionX * force * 5; 
          const directionY = forceDirectionY * force * 5;

          this.x -= directionX;
          this.y -= directionY;
        }
      }
    }

    // Initialize the particle system
    function initParticles() {
      particlesArray = [];
      // I lowered the density number from 9000 to 12000 so the screen isn't overwhelmed with huge icons
      const numberOfParticles = (canvas.height * canvas.width) / 12000; 
      
      for (let i = 0; i < numberOfParticles; i++) {
        // Increased size so you can actually see the favicon (10px to 25px)
        let size = (Math.random() * 15) + 10; 
        let x = Math.random() * canvas.width;
        let y = Math.random() * canvas.height;
        let weight = (Math.random() * 2) + 0.5; 
        
        particlesArray.push(new Particle(x, y, size, weight));
      }
    }

    // Animation loop
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
      }
      requestAnimationFrame(animateParticles);
    }

    // Wait for the image to load before starting the animation so nothing blanks out
    particleImage.onload = () => {
        initParticles();
        animateParticles();
    };
  </script>
